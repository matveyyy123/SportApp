<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SportApp — Вход</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h2>Войти в аккаунт</h2>
            <form id="loginForm" novalidate>
                <div class="form-group">
                    <input type="email" id="loginEmail" placeholder="Почта" required />
                    <span class="error-message" id="loginEmailError"></span>
                </div>
                <div class="form-group">
                    <input type="password" id="loginPassword" placeholder="Пароль" required />
                    <span class="error-message" id="loginPasswordError"></span>
                </div>
                <button type="submit" class="btn-primary">Войти в аккаунт</button>
            </form>
            <p class="auth-switch">
                Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
            </p>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- ВЕСЬ JS КОД ВНУТРИ HTML (перенесен из auth.js)              -->
    <!-- ============================================================ -->
    <script>
        // ===== api.js код =====
        const API_URL = 'http://localhost:5000/api';

        function getToken() {
            return localStorage.getItem('token');
        }

        function setToken(token) {
            localStorage.setItem('token', token);
        }

        function removeToken() {
            localStorage.removeItem('token');
        }

        async function apiRequest(endpoint, method = 'GET', data = null) {
            const token = getToken();
            const options = {
                method,
                headers: { 'Content-Type': 'application/json' },
            };
            if (token) {
                options.headers['x-auth-token'] = token;
            }
            if (data) {
                options.body = JSON.stringify(data);
            }
            try {
                const response = await fetch(`${API_URL}${endpoint}`, options);
                const result = await response.json();
                if (!response.ok) {
                    throw new Error(result.message || 'Что-то пошло не так');
                }
                return result;
            } catch (error) {
                console.error('API Error:', error);
                throw error;
            }
        }

        // ===== ЛОГИН (из auth.js) =====
        const loginForm = document.getElementById('loginForm');
        if (loginForm) {
            const emailInput = document.getElementById('loginEmail');
            const passwordInput = document.getElementById('loginPassword');
            const emailError = document.getElementById('loginEmailError');
            const passwordError = document.getElementById('loginPasswordError');

            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = emailInput.value.trim();
                const password = passwordInput.value;

                if (!email || !password) {
                    if (!email) {
                        emailInput.classList.add('error');
                        emailError.textContent = 'Введите почту';
                    }
                    if (!password) {
                        passwordInput.classList.add('error');
                        passwordError.textContent = 'Введите пароль';
                    }
                    return;
                }

                const btn = loginForm.querySelector('.btn-primary');
                btn.textContent = 'Вход...';
                btn.disabled = true;

                try {
                    const response = await apiRequest('/auth/login', 'POST', { email, password });
                    setToken(response.token);
                    alert('✅ Добро пожаловать, ' + response.user.name + '!');
                    window.location.href = 'workouts.html';
                } catch (error) {
                    alert('❌ ' + error.message);
                } finally {
                    btn.textContent = 'Войти в аккаунт';
                    btn.disabled = false;
                }
            });

            emailInput.addEventListener('input', () => {
                emailInput.classList.remove('error');
                emailError.textContent = '';
            });
            passwordInput.addEventListener('input', () => {
                passwordInput.classList.remove('error');
                passwordError.textContent = '';
            });
        }
    </script>
</body>
</html>
